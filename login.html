<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — HIKMAH</title>

    <!-- Подключаем Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        const supabase = supabase.createClient(
            "https://avldlzkjprmqxmbgbclm.supabase.co",
             https://avldlzkjprmqxmbgbclm.supabase.co
        );
    </script>

    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

<header>
    <div class="logo"><strong>HIKMAH</strong></div>
    <nav>
        <a href="index.html">Главная</a>
        <a href="courses.html">Курсы</a>
        <a href="about.html">О нас</a>
        <a href="contact.html">Контакты</a>
    </nav>
</header>

<section class="hero small">
    <h1>Вход в аккаунт</h1>
    <p>Добро пожаловать обратно</p>
</section>

<div class="container">
    <div class="card">
        <form onsubmit="event.preventDefault(); loginUser();">
            <label>Email</label>
            <input id="loginEmail" type="email" placeholder="Введите email" required>

            <label>Пароль</label>
            <input id="loginPassword" type="password" placeholder="Введите пароль" required>

            <button class="btn" type="submit">Войти</button>

            <p style="margin-top: 15px;">
                Нет аккаунта? <a href="register.html">Создать</a>
            </p>
        </form>
    </div>
</div>

<footer>
    © 2026 HIKMAH — Все права защищены
</footer>

<!-- JS-код входа -->
<script>
async function loginUser() {
    const email = document.querySelector("#loginEmail").value;
    const password = document.querySelector("#loginPassword").value;

    const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
    });

    if (error) {
        alert("Ошибка: " + error.message);
    } else {
        alert("Вход выполнен!");
        window.location.href = "profile.html";
    }
}
</script>

</body>
