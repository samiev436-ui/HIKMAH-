<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — HIKMAH</title>

    <!-- Подключаем Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        const supabase = supabase.createClient(
            "https://avldlzkjprmqxmbgbclm.supabase.co",
            "YOUR-ANON-KEY"
        );
    </script>

    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

<header>
    <div class="logo"><strong>HIKMAH</strong></div>
    <nav>
        <a href="index.html">Главная</a>
        <a href="courses.html">Курсы</a>
        <a href="about.html">О нас</a>
        <a href="contact.html">Контакты</a>
    </nav>
</header>

<section class="hero small">
    <h1>Создать аккаунт</h1>
    <p>Регистрация занимает меньше минуты</p>
</section>

<div class="container">
    <div class="card">
        <form onsubmit="event.preventDefault(); registerUser();">
            <label>Email</label>
            <input id="regEmail" type="email" placeholder="Введите email" required>

            <label>Пароль</label>
            <input id="regPassword" type="password" placeholder="Придумайте пароль" required>

            <button class="btn" type="submit">Зарегистрироваться</button>
        </form>
    </div>
</div>

<footer>
    © 2026 HIKMAH — Все права защищены
</footer>

<!-- JS‑код ДОЛЖЕН быть внизу, перед </body> -->
<script>
async function registerUser() {
    const email = document.querySelector("#regEmail").value;
    const password = document.querySelector("#regPassword").value;

    const { data, error } = await supabase.auth.signUp({
        email: email,
        password: password
    });

    if (error) {
        alert("Ошибка: " + error.message);
    } else {
        alert("Регистрация успешна!");
        window.location.href = "login.html";
    }
}
</script>

</body>
</html>
